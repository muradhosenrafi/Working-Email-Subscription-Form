<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Form</title>
    <link rel="icon" href="./send-icon.png" type="image">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="hero">
<h3>Coming Soon!</h3>
<h1>OurBrand New <br>Website Is On It's Way</h1>
<p>Subscribe for more details</p>
<form name="YOUR_FORM_NAME">
    <input type="email" name="Email" placeholder="Your email id" required>
    <button type="submit"><img src="./send-icon.png" width="30px"></button>
</form>
    <span id="massg"></span>
    </div>

<script>
	const scriptURL = 'https://script.google.com/macros/s/AKfycbxR9KnhdcaigglHbgxxzEZs6ICxsCqTZ_B7fCAu5gc6JXEjd2YTCwnD1HYJagGqCDLX_A/exec'
	const form = document.forms['YOUR_FORM_NAME']
    const massg=document.getElementById("massg");


	form.addEventListener('submit', e => {
		e.preventDefault()
		fetch(scriptURL, { method: 'POST', body: new FormData(form) })
			.then(response => response.json())
			.then(response =>{
massg.innerHTML="Thank You For Subscribing!"
setTimeout(function(){
    massg.innerHTML=""
},5000)
form.reset()
            })
			.catch(error => console.error('Error!', error.message))
	})
</script>


</body>
</html>
